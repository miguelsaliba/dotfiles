$image = $HOME/.config/background
source = colors.conf

# BACKGROUND
background {
    path = $image
    blur_passes = 2
    blur_size = 2
}

# GENERAL
general {
    hide_cursor = false
    ignore_empty_input = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 250, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.35 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(0, 0, 0, 0.5)
    font_color = rgba(255, 255, 255, 1)
    fade_on_empty = false
    rounding = -1
    check_color = rgb(204, 136, 34)
    placeholder_text = <span foreground="##cdd6f4">Input Password...</span>
    hide_input = false
    position = 0, -200
    halign = center
    valign = center
}

# DATE
label {
  text = cmd[update:1000] date +"%A, %B %d"
  color = rgba(242, 243, 244, 0.75)
  font_size = 22
  font_family = JetBrains Mono Semibold
  position = 0, 300
  halign = center
  valign = center
}

# TIME
label {
  text = cmd[update:1000] date +"%-I:%M"
  color = rgba(242, 243, 244, 0.75)
  font_size = 120
  font_family = JetBrains Mono Extrabold
  position = 0, 200
  halign = center
  valign = center
}

# CURRENT SONG
label {
    monitor = 
    text = cmd[update:1000] $HOME/.config/hypr/scripts/media.sh
    color = rgba(255, 255, 255, 0.4)
    font_size = 18
    font_family = JetBrains Mono
    position = 0, 50
    halign = center
    valign = bottom
}

# LOCATION & WEATHER
label {
    monitor =
    text = cmd[update:1000] $HOME/.config/hypr/scripts/weather.sh
    color = rgba(255, 255, 255, 1)
    font_size = 10
    font_family = JetBrains Mono Nerd Font ExtraBold
    position = 0, 465
    halign = center
    valign = center
}

label {
    text = cmd[update:10000] /bin/zsh -c 'cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1 | sed "s/$/%/" || echo ""'
    color = rgba(255, 255, 255, 1)
    font_size = 15
    font_family = JetBrains Mono Nerd Font
    position = -40, 20
    halign = right
    valign = bottom
}
